version: 2
updates:
  - package-ecosystem: maven
    directory: "/"
    schedule:
      interval: monthly
    groups:
      runtime-dependencies:
        patterns:
          - "org.jenkins-ci.main:*"
          - "org.jenkins-ci.plugins:*"
          - "com.cloudbees:groovy-cps"
          - "org.codehaus.groovy:*"
      build-dependencies:
        patterns:
          # Maven plugins:
          - "*maven*plugin*"
          - "org.apache.maven*:*"
          - "*surefire*"
          - "*forbiddenapis*"
          # Other test dependencies:
          - "org.junit:*"
          - "org.mockito:*"
          - "com.lesfurets:*"
          - "javax.servlet:*"
    ignore:
      # Must be aligned with the version Jenkins uses; see comment in pom.xml.
      - dependency-name: "org.codehaus.groovy:*"
      # Newer versions require a Groovy version newer than what Jenkins uses; see comment in pom.xml.
      - dependency-name: "org.codehaus.gmavenplus:gmavenplus-plugin"
